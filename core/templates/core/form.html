{% extends 'core/base.html' %}

{% block title %}Track Form{% endblock %}

{% block content %}

<h2 class="mb-3">Track Form</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Save
    </button>

    <a href="{% url 'track_list' %}" class="btn btn-secondary">
        Cancel
    </a>
</form>

{% endblock %}
