{% extends 'core/base.html' %}

{% block content %}

<h2>Delete Track</h2>

<p>Are you sure you want to delete:</p>

<strong>{{ object.name }}</strong>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">
        Yes, Delete
    </button>

    <a href="{% url 'track_list' %}" class="btn btn-secondary">
        Cancel
    </a>
</form>

{% endblock %}
